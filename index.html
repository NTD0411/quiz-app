<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi Trắc Nghiệm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        /* Test Selection View */
        .test-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .test-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .test-btn:active {
            transform: translateY(0);
        }

        /* Quiz View */
        .quiz-header {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .quiz-header h2 {
            font-size: 24px;
            color: #667eea;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a6268;
        }

        .score-display {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .question-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .question-text {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: white;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: #f0f1ff;
            border-color: #667eea;
        }

        .option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
        }

        .option.selected {
            background: #e8ebff;
            border-color: #667eea;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .answer-info {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .answer-info.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .answer-info.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .quiz-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .pagination button:hover {
            background: #667eea;
            color: white;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-weight: bold;
            color: #667eea;
            min-width: 150px;
            text-align: center;
        }

        .results {
            background: #f8f9fa;
            padding: 30px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .results h3 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .score-circle.good {
            background: linear-gradient(135deg, #17a2b8 0%, #20c997 100%);
        }

        .score-circle.average {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
        }

        .score-circle.poor {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .result-message {
            font-size: 18px;
            margin-bottom: 20px;
            color: #666;
        }

        .hidden {
            display: none !important;
        }

        .progress-bar {
            background: #e9ecef;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .question-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
        }

        .question-nav button {
            padding: 8px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            min-height: 35px;
        }

        .question-nav button:hover {
            border-color: #667eea;
            background: #f0f1ff;
        }

        .question-nav button.answered {
            background: #d4edda;
            border-color: #28a745;
            color: #28a745;
        }

        .question-nav button.current {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .question-nav button.unanswered {
            background: #fff3cd;
            border-color: #ffc107;
            color: #ff9800;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 22px;
            }

            .quiz-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .test-list {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            .btn {
                min-width: 100px;
                padding: 10px;
            }

            .score-circle {
                width: 120px;
                height: 120px;
                font-size: 36px;
            }

            .question-nav {
                grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
                gap: 5px;
            }
        }

        .nav-section {
            margin-bottom: 15px;
        }

        .nav-section-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Ôn Thi Trắc Nghiệm</h1>
            <p>Ôn tập dễ dàng, nhanh chóng trên mọi thiết bị</p>
        </header>

        <div class="content">
            <!-- Test Selection View -->
            <div id="testSelection" class="view">
                <h2 style="margin-bottom: 20px; color: #667eea;">Chọn đề thi</h2>
                <div class="test-list" id="testList"></div>
            </div>

            <!-- Quiz View -->
            <div id="quizView" class="view hidden">
                <div class="quiz-header">
                    <h2 id="quizTitle"></h2>
                    <button class="back-btn" onclick="backToSelection()">← Quay lại</button>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div style="margin-bottom: 20px;">
                    <div class="nav-section-title">Điều hướng nhanh</div>
                    <div class="question-nav" id="questionNav"></div>
                </div>

                <div id="questionsContainer"></div>

                <div class="quiz-controls">
                    <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn">← Câu trước</button>
                    <button class="btn btn-primary" onclick="submitQuiz()" id="submitBtn">Nộp bài</button>
                    <button class="btn btn-secondary" onclick="nextQuestion()" id="nextBtn">Câu sau →</button>
                </div>

                <div id="resultsView" class="hidden">
                    <div class="results">
                        <h3>Kết quả bài làm</h3>
                        <div class="score-circle" id="scoreCircle">0/0</div>
                        <div class="result-message" id="resultMessage"></div>
                        <div style="font-size: 18px; margin-bottom: 20px; color: #333;">
                            <p id="scorePercentage"></p>
                            <p id="answerSummary"></p>
                        </div>
                        <div class="quiz-controls">
                            <button class="btn btn-primary" onclick="backToSelection()">Chọn đề khác</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        // Question data - Empty for now, will be added later
        let questionData = {};
        let currentTest = null;
        let currentQuestion = 0;
        let userAnswers = {};

        // Initialize
        function init() {
            renderTestSelection();
        }

        function renderTestSelection() {
            const testList = document.getElementById('testList');
            testList.innerHTML = '';

            for (let i = 1; i <= 20; i++) {
                const btn = document.createElement('button');
                btn.className = 'test-btn';
                btn.textContent = `TEST ${String(i).padStart(2, '0')}`;
                btn.onclick = () => startTest(i);
                testList.appendChild(btn);
            }

            showView('testSelection');
        }

        function startTest(testNum) {
            currentTest = testNum;
            currentQuestion = 0;
            userAnswers = {};

            // Initialize question data if not exists
            if (!questionData[testNum]) {
                questionData[testNum] = generateQuestionData(testNum);
            }

            showView('quizView');
            renderQuiz();
        }

        function generateQuestionData(testNum) {
            // This function generates dummy question data
            // In a real scenario, you would load this from a database or API
            const questions = {};
            for (let i = 1; i <= 30; i++) {
                questions[i] = {
                    text: `Câu hỏi ${i}`,
                    options: ['Đáp án A', 'Đáp án B', 'Đáp án C', 'Đáp án D']
                };
            }
            return questions;
        }

        function renderQuiz() {
            const testNum = currentTest;
            const totalQuestions = 30;
            
            // Update header
            document.getElementById('quizTitle').textContent = `TEST ${String(testNum).padStart(2, '0')} (Câu ${currentQuestion + 1}/${totalQuestions})`;

            // Update progress bar
            const progress = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // Render question navigation
            renderQuestionNav();

            // Render current question
            renderCurrentQuestion();

            // Update buttons state
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = currentQuestion === totalQuestions - 1;
        }

        function renderQuestionNav() {
            const navContainer = document.getElementById('questionNav');
            navContainer.innerHTML = '';

            for (let i = 1; i <= 30; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = i === currentQuestion + 1 ? 'current' : '';
                
                if (userAnswers[i]) {
                    btn.classList.add('answered');
                } else {
                    btn.classList.add('unanswered');
                }

                btn.onclick = () => {
                    currentQuestion = i - 1;
                    renderQuiz();
                    document.getElementById('questionsContainer').scrollIntoView({ behavior: 'smooth' });
                };
                navContainer.appendChild(btn);
            }
        }

        function renderCurrentQuestion() {
            const container = document.getElementById('questionsContainer');
            const qNum = currentQuestion + 1;
            
            container.innerHTML = `
                <div class="question-container">
                    <div class="question-text">Câu ${qNum}:</div>
                    <div class="options" id="optionsContainer"></div>
                </div>
            `;

            const optionsContainer = document.getElementById('optionsContainer');
            const options = ['A', 'B', 'C', 'D'];

            options.forEach(option => {
                const label = document.createElement('label');
                label.className = 'option';
                
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = `question_${qNum}`;
                input.value = option;
                input.checked = userAnswers[qNum] === option;

                input.addEventListener('change', () => {
                    userAnswers[qNum] = option;
                    renderQuestionNav();
                });

                label.appendChild(input);
                label.appendChild(document.createTextNode(`${option}. `));
                
                optionsContainer.appendChild(label);
            });
        }

        function nextQuestion() {
            if (currentQuestion < 29) {
                currentQuestion++;
                renderQuiz();
                document.getElementById('questionsContainer').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuiz();
                document.getElementById('questionsContainer').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function submitQuiz() {
            // Calculate score
            const correctAnswers = testAnswers[currentTest];
            let score = 0;
            let answered = 0;

            for (let i = 1; i <= 30; i++) {
                if (userAnswers[i]) {
                    answered++;
                    if (userAnswers[i] === correctAnswers[i]) {
                        score++;
                    }
                }
            }

            // Show results
            const scorePercentage = Math.round((score / 30) * 100);
            const scoreCircleEl = document.getElementById('scoreCircle');
            scoreCircleEl.textContent = `${score}/30`;

            let message = '';
            let scoreClass = '';

            if (scorePercentage >= 80) {
                message = '🎉 Xuất sắc!';
                scoreClass = 'excellent';
            } else if (scorePercentage >= 60) {
                message = '👍 Tốt!';
                scoreClass = 'good';
            } else if (scorePercentage >= 40) {
                message = '📚 Cần cải thiện';
                scoreClass = 'average';
            } else {
                message = '💪 Cố gắng thêm';
                scoreClass = 'poor';
            }

            scoreCircleEl.className = `score-circle ${scoreClass}`;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('scorePercentage').textContent = `${scorePercentage}% - ${score} câu đúng trên ${answered} câu trả lời`;
            document.getElementById('answerSummary').textContent = `Bạn trả lời ${answered} trên 30 câu hỏi`;

            // Show results and hide quiz controls
            document.getElementById('resultsView').classList.remove('hidden');
            document.querySelector('.quiz-controls').style.display = 'none';
            document.getElementById('questionNav').parentElement.style.display = 'none';
            document.getElementById('questionsContainer').style.display = 'none';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToSelection() {
            document.getElementById('resultsView').classList.add('hidden');
            document.querySelector('.quiz-controls').style.display = 'flex';
            document.getElementById('questionNav').parentElement.style.display = 'block';
            document.getElementById('questionsContainer').style.display = 'block';
            renderTestSelection();
        }

        function showView(viewId) {
            const views = document.querySelectorAll('.view');
            views.forEach(view => view.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        // Start the app
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
