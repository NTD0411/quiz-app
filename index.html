<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2b5329; --primary-hover: #1e3b1d; --accent: #d4af37; 
            --success: #27ae60; --danger: #c0392b;
            --bg-body: #f0f4f1; --bg-card: #ffffff;
            --text-main: #1a251a; --text-muted: #5c6e5a;
            --border: #cdd5cb; --shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --primary: #4b8b3b; --primary-hover: #60a84e; --accent: #ffd700;
            --success: #2ecc71; --danger: #e74c3c;
            --bg-body: #0a0f0b; --bg-card: #141d15;
            --text-main: #e8eee8; --text-muted: #8c9e8a;
            --border: #2b3a2a; --shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); line-height: 1.6; transition: all 0.4s ease; }
        
        #intro-screen { position: fixed; inset: 0; z-index: 10005; background: var(--bg-body); display: flex; align-items: center; justify-content: center; }
        .intro-text { color: var(--primary); font-size: 3.5rem; font-weight: 900; text-shadow: 0 4px 15px rgba(0,0,0,0.15); animation: introPop 3.5s forwards; }
        @keyframes introPop { 0% { transform: scale(0.5); opacity: 0; } 15% { transform: scale(1.1); opacity: 1; } 80% { opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        
        .watermark { position: fixed; bottom: 30px; right: 30px; z-index: 9990; background: rgba(43,83,41,0.85); color: var(--accent); padding: 10px 25px; border-radius: 8px; border: 2px solid var(--accent); font-weight: 900; }
        .fab-btn { position: fixed; bottom: 30px; left: 30px; z-index: 10000; width: 55px; height: 55px; border-radius: 50%; background: var(--primary); border: 2px solid var(--accent); color: white; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .fab-btn:hover { transform: scale(1.15); background: var(--primary-hover); }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 35px; box-shadow: var(--shadow); margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; position: sticky; top: 10px; z-index: 998; }
        .nav-title { font-weight: bold; font-size: 1.3rem; }
        .icon-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .icon-btn:hover { color: var(--accent); }
        
        .test-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; }
        .test-card { background: var(--bg-body); border: 2px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .test-card:hover { border-color: var(--accent); transform: translateY(-5px); background: var(--primary); color: white; }
        .test-card h3 { color: var(--primary); font-size: 1.2rem; margin-bottom: 5px; }
        .test-card:hover h3 { color: white; }
        .test-card p { color: var(--text-muted); font-size: 0.9rem; }
        .test-card:hover p { color: rgba(255,255,255,0.8); }
        
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-3px); }
        
        .question-block { margin-bottom: 30px; padding: 20px; background: var(--bg-body); border-radius: 10px; border-left: 4px solid var(--primary); }
        .question-text { font-weight: 600; font-size: 1rem; margin-bottom: 15px; line-height: 1.5; }
        .options { display: grid; gap: 10px; }
        .option { padding: 12px 18px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--bg-card); transition: 0.25s; }
        .option:hover { border-color: var(--primary); transform: translateX(5px); }
        .option.selected { border-color: var(--primary); background: rgba(43,83,41,0.1); font-weight: 600; }
        .option.correct { border-color: var(--success) !important; background: rgba(39,174,96,0.15) !important; }
        .option.wrong { border-color: var(--danger) !important; background: rgba(192,57,43,0.1) !important; }
        
        .review-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; margin-top: 20px; }
        .review-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: white; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .review-item:hover { transform: scale(1.2); }
        .review-item.correct { background: var(--success); }
        .review-item.wrong { background: var(--danger); }
        .review-item.unanswered { background: var(--text-muted); }
        
        .wrong-answer-item { background: var(--bg-body); padding: 15px; border-radius: 8px; border-left: 4px solid var(--danger); margin-bottom: 15px; }
        .wrong-qa { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .wrong-answer-item h4 { color: var(--danger); margin-bottom: 10px; font-size: 0.95rem; }
        .answer-row { display: flex; align-items: center; gap: 15px; padding: 8px 0; }
        .answer-label { font-weight: 600; color: var(--text-muted); width: 120px; }
        .answer-value { padding: 8px 12px; background: var(--bg-card); border-radius: 6px; border-left: 3px solid; }
        .user-ans { border-left-color: var(--danger); color: var(--danger); }
        .correct-ans { border-left-color: var(--success); color: var(--success); }
        
        .hide { display: none !important; }
    </style>
</head>

                    17: {text: "What do visitors do to have a Cambodian visa upon arrival?", options: ['Both A and B.', 'They must have two passport-sized photographs.', 'They must pay the fine a small amount.', 'They must do nothing.']},
                    18: {text: "How long does it take a visitor to travel from Ho Chi Minh to Cambodia by bus?", options: ['takes 3 hours', 'takes 6 hours', 'takes between one to two hours', 'takes 2 hours']},
                    19: {text: "What is the name of the border stop mentioned in land crossing paragraph?", options: ['Moc Bai on the Vietnamese side and Bavet on the Cambodian side.', 'Chau Doc on the Vietnamese side and Bavet on the Cambodian side.', 'Moc Bai on the Vietnamese side and Siem Reap on the Cambodian side.', 'Moc Bai on the Cambodian side and Chau Doc on the Vietnamese side.']},
                    20: {text: "Where does fast boat service operate?", options: ['Fast boat service is available from Chau Doc in Vietnam to Phnom Penh.', 'Fast boat service is available from Moc Bai in Vietnam to Phnom Penh.', 'Fast boat service is available from Mekong River in Vietnam to Phnom Penh.', 'Fast boat service is available from Moc Chau in Vietnam.']},
                    21: {text: "Câu 21 - Phần 4", options: ['popular', 'famous', 'favourite', 'current']},
                    22: {text: "Câu 22 - Phần 4", options: ['baggage', 'equipment', 'property', 'tool']},
                    23: {text: "Câu 23 - Phần 4", options: ['voyages', 'ways', 'directions', 'distances']},
                    24: {text: "Câu 24 - Phần 4", options: ['by', 'on', 'at', 'of']},
                    25: {text: "Câu 25 - Phần 4", options: ['make', 'take', 'pick', 'do']},
                    26: {text: "Câu 26 - Phần 4", options: ['which', 'who', 'where', 'when']},
                    27: {text: "Câu 27 - Phần 4", options: ['just', 'such', 'as', 'like']},
                    28: {text: "Câu 28 - Phần 4", options: ['lonely', 'alone', 'single', 'separate']},
                    29: {text: "Câu 29 - Phần 4", options: ['stay', 'remain', 'leave', 'let']},
                    30: {text: "Câu 30 - Phần 4", options: ['wild', 'natural', 'loose', 'free']}
                }
            };
        }

        // Generate placeholder for tests 3-20
        for (let t = 3; t <= 20; t++) {
            questionsDB[t] = {};
            for (let i = 1; i <= 30; i++) {
                questionsDB[t][i] = {
                    text: `Câu hỏi ${i} - Đề thi số ${t}`,
                    options: ['Đáp án A', 'Đáp án B', 'Đáp án C', 'Đáp án D']
                };
            }
        }

        let currentTest = null;
        let userAnswers = {};
        let isResultMode = false;

        // ========== INIT ==========
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                renderMenu();
            }, 3500);
        });

        function renderMenu() {
            const grid = document.getElementById('test-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 20; i++) {
                const card = document.createElement('div');
                card.className = 'test-card';
                card.innerHTML = `<h3><i class="fas fa-book-open"></i> ĐỀ ${String(i).padStart(2, '0')}</h3><p>30 Câu Hỏi</p>`;
                card.onclick = () => startTest(i);
                grid.appendChild(card);
            }
        }

        function startTest(testNum) {
            currentTest = testNum;
            userAnswers = {};
            isResultMode = false;
            document.getElementById('main-menu').classList.add('hide');
            document.getElementById('quiz-screen').classList.remove('hide');
            document.getElementById('result-screen').classList.add('hide');
            document.getElementById('nav-title').textContent = `ĐỀ THI ${String(testNum).padStart(2, '0')} | 30 Câu Hỏi`;
            renderQuiz();
            document.getElementById('quiz-content').scrollIntoView();
        }

        function renderQuiz() {
            const content = document.getElementById('quiz-content');
            const questions = questionsDB[currentTest];
            let html = '';

            for (let i = 1; i <= 30; i++) {
                const q = questions[i];
                const userAnswer = userAnswers[i];
                const correctAnswer = answerKeys[currentTest][i];
                const isCorrect = userAnswer === correctAnswer && userAnswer;

                html += `<div class="question-block">
                    <div class="question-text"><strong>Câu ${i}:</strong> ${q.text}</div>
                    <div class="options">`;
                
                ['A', 'B', 'C', 'D'].forEach((opt, idx) => {
                    const isSelected = userAnswer === opt;
                    let cls = 'option';
                    if (isSelected) cls += ' selected';
                    if (isResultMode && isSelected) {
                        cls += isCorrect ? ' correct' : ' wrong';
                    }
                    html += `<div class="${cls}" onclick="selectAnswer(${i}, '${opt}')" style="pointer-events: ${isResultMode ? 'none' : 'auto'}"><strong>${opt}.</strong> ${q.options[idx]}</div>`;
                });
                html += `</div></div>`;
            }
            content.innerHTML = html;
        }

        function selectAnswer(qNum, answer) {
            if (!isResultMode) {
                userAnswers[qNum] = answer;
                renderQuiz();
            }
        }

        function submitQuiz() {
            isResultMode = true;
            let score = 0;
            const wrongAnswers = [];

            for (let i = 1; i <= 30; i++) {
                const correct = answerKeys[currentTest][i];
                if (userAnswers[i] && userAnswers[i] === correct) {
                    score++;
                } else if (!userAnswers[i] || userAnswers[i] !== correct) {
                    wrongAnswers.push({
                        qNum: i,
                        userAnswer: userAnswers[i] || 'Không trả lời',
                        correctAnswer: correct,
                        questionText: questionsDB[currentTest][i].text
                    });
                }
            }

            const percentage = Math.round((score / 30) * 100);
            let message = '';
            if (percentage >= 90) message = '🏆 XUẤT SẮC!';
            else if (percentage >= 80) message = '🎉 TẤT CẢ!';
            else if (percentage >= 70) message = '👍 TỐT!';
            else if (percentage >= 60) message = '📚 ĐƯỢC RỒI';
            else if (percentage >= 40) message = '⚡ CẦN CẢI THIỆN';
            else message = '💪 CỐ GẮNG THÊM';

            document.getElementById('score-display').textContent = score;
            document.getElementById('score-message').textContent = message;
            document.getElementById('wrong-count').textContent = wrongAnswers.length;

            // Render review grid
            let reviewHTML = '';
            for (let i = 1; i <= 30; i++) {
                const ans = userAnswers[i];
                const correct = answerKeys[currentTest][i];
                let cls = 'unanswered';
                if (ans) cls = ans === correct ? 'correct' : 'wrong';
                reviewHTML += `<div class="review-item ${cls}">${i}</div>`;
            }
            document.getElementById('review-grid').innerHTML = reviewHTML;

            // Render wrong answers list
            let wrongHTML = '';
            if (wrongAnswers.length === 0) {
                wrongHTML = '<p style="color: var(--success); text-align: center; padding: 20px; font-weight: bold;">🎊 Bạn đã trả lời hết bài! Không có câu sai.</p>';
            } else {
                wrongAnswers.forEach(w => {
                    const optionsText = questionsDB[currentTest][w.qNum].options;
                    const userOptIdx = ['A','B','C','D'].indexOf(w.userAnswer);
                    const correctOptIdx = ['A','B','C','D'].indexOf(w.correctAnswer);
                    wrongHTML += `
                        <div class="wrong-answer-item">
                            <h4>❌ Câu ${w.qNum}</h4>
                            <p style="margin-bottom: 10px; font-size: 0.95rem;"><strong>${w.questionText}</strong></p>
                            <div class="answer-row">
                                <span class="answer-label">Bạn chọn:</span>
                                <span class="answer-value user-ans">${w.userAnswer !== 'Không trả lời' ? w.userAnswer + '. ' + optionsText[userOptIdx] : 'Không trả lời'}</span>
                            </div>
                            <div class="answer-row">
                                <span class="answer-label">Đáp án đúng:</span>
                                <span class="answer-value correct-ans">${w.correctAnswer}. ${optionsText[correctOptIdx]}</span>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('wrong-answers-list').innerHTML = wrongHTML;

            renderQuiz();
            document.getElementById('quiz-screen').classList.add('hide');
            document.getElementById('result-screen').classList.remove('hide');
            document.getElementById('result-screen').scrollIntoView();
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hide');
            document.getElementById('quiz-screen').classList.add('hide');
            document.getElementById('result-screen').classList.add('hide');
            document.getElementById('main-menu').scrollIntoView();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-icon').className = 'fas fa-sun';
        }
    </script>
</body>
</html>
